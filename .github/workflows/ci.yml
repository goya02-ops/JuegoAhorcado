name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main, develop, feature/**, hotfix/**, release/**]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
        name: Instalar dependencias

      - run: npm run build
        name: Compilar (Vite)

      - run: npm test -- --coverage
        name: Tests unitarios con cobertura (Vitest)

      - name: Report Coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2

      - name: SonarQube Scan
        if: github.ref_name == 'main'
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=goya02-ops_JuegoAhorcado
            -Dsonar.organization=goya02-ops
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - run: npx playwright install chromium --with-deps
        name: Instalar navegadores Playwright

      - run: npm run at
        name: Tests de aceptación (Playwright)

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
            coverage/
          if-no-files-found: ignore

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
        name: Instalar dependencias

      - run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        name: Pull Vercel environment

      - run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        name: Build con Vercel

      - run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        name: Deploy a producción
