name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
        name: Instalar dependencias

      - run: npm run build
        name: Compilar (Vite)

      - run: npm test
        name: Tests unitarios (Vitest)

      - run: npx playwright install chromium --with-deps
        name: Instalar navegadores Playwright

      - run: npm run at
        name: Tests de aceptación (Playwright)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
